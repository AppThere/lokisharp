name: Update Golden Images

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are goldens being updated?'
        required: true
        type: string

jobs:
  update:
    name: Regenerate Golden PNGs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y libfontconfig1 libfreetype6 xvfb

      - name: Restore & Build
        run: dotnet restore && dotnet build --configuration Release --no-restore

      - name: Regenerate goldens
        run: |
          xvfb-run -a dotnet test tests/rendering --configuration Release --no-build \
            -- --regenerate-goldens

      - name: Commit updated goldens
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/rendering/Goldens/
          git commit -s -m "test(rendering): regenerate goldens — ${{ inputs.reason }}" || echo "No changes."
          git push
