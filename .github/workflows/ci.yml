name: CI

on:
  push:
    branches: [main, 'dev/**', 'feat/**', 'fix/**', 'claude/**']
  pull_request:
    branches: [main, 'dev/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── Build & unit test — all platforms ────────────────────────────────────────
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for DCO check

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install system deps (Linux — SkiaSharp runtime requirements)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfontconfig1 libfreetype6 libgdiplus

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Unit tests
        run: dotnet test tests/unit --configuration Release --no-build
             --logger "trx;LogFileName=unit-results.trx"
             --results-directory TestResults/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/

  # ── Rendering golden tests — Linux only (deterministic CPU raster) ───────────
  rendering-tests:
    name: Rendering Golden Tests
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install system deps (SkiaSharp on Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfontconfig1 libfreetype6 libgdiplus xvfb

      - name: Restore & Build
        run: dotnet restore && dotnet build --configuration Release --no-restore

      - name: Rendering tests (headless)
        run: xvfb-run -a dotnet test tests/rendering --configuration Release --no-build
             --logger "trx;LogFileName=rendering-results.trx"
             --results-directory TestResults/

      - name: Upload rendering test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendering-results
          path: TestResults/

  # ── Architecture enforcement ──────────────────────────────────────────────────
  architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y libfontconfig1 libfreetype6 libgdiplus
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - name: Run architecture tests
        run: dotnet test tests/unit --configuration Release --no-build
             --filter "Category=Architecture"

  # ── File header & line count checks ─────────────────────────────────────────
  conventions:
    name: Coding Conventions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check file headers
        run: |
          MISSING=0
          while IFS= read -r -d '' file; do
            if ! head -3 "$file" | grep -q "// LAYER:"; then
              echo "MISSING HEADER: $file"
              MISSING=1
            fi
          done < <(find src tools -name "*.cs" -not -path "*/obj/*" -print0)
          if [ $MISSING -eq 1 ]; then
            echo "ERROR: Some files are missing the required file header."
            echo "See docs/LLM_Design_Guide.docx §2.1 for the required format."
            exit 1
          fi
          echo "All file headers present."

      - name: Check line count ceiling (300 lines)
        run: |
          OVER=0
          while IFS= read -r -d '' file; do
            # Count non-blank, non-comment lines (\s* uses POSIX character class)
            COUNT=$(grep -v '^\s*$' "$file" | grep -v '^\s*//' | wc -l)
            if [ "$COUNT" -gt 300 ]; then
              echo "OVER LIMIT ($COUNT lines): $file"
              OVER=1
            fi
          done < <(find src tools -name "*.cs" -not -path "*/obj/*" -print0)
          if [ $OVER -eq 1 ]; then
            echo "ERROR: Some files exceed the 300-line ceiling."
            echo "Decompose the type rather than tolerating the violation."
            exit 1
          fi
          echo "All files within 300-line ceiling."

      - name: Check for forbidden folders
        run: |
          FORBIDDEN="Helpers Utils Common Misc Shared Base Extensions"
          BAD=0
          for name in $FORBIDDEN; do
            if find src -type d -name "$name" | grep -q .; then
              echo "FORBIDDEN FOLDER: $name"
              BAD=1
            fi
          done
          if [ $BAD -eq 1 ]; then exit 1; fi
          echo "No forbidden folders found."

  # ── DCO sign-off check ────────────────────────────────────────────────────────
  dco:
    name: DCO Sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO
        uses: colin-at-work/action-dco@v1

  # ── lokiprint smoke test ──────────────────────────────────────────────────────
  lokiprint-smoke:
    name: lokiprint Smoke Test
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y libfontconfig1 libfreetype6
      - name: Restore & build
        run: dotnet restore && dotnet build --configuration Release --no-restore
      - name: Smoke test — PDF output
        run: |
          mkdir -p out
          dotnet run --project tools/lokiprint --configuration Release --no-build \
            -- test-render --output out/smoke.pdf
          test -f out/smoke.pdf && echo "PDF generated successfully."
      - name: Smoke test — PNG tile output
        run: |
          dotnet run --project tools/lokiprint --configuration Release --no-build \
            -- test-render --output out/smoke-tile.png --tile 0,0
          test -f out/smoke-tile.png && echo "PNG tile generated successfully."
